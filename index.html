<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring, Compliance and Continuous Improvement System</title>

<style>
body {font-family: Arial, sans-serif; margin:0; background:#f4f6f9;}

.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#1f2937; color:white; padding:20px;
}

.sidebar h2 {margin-top:0;}

.sidebar a {
    display:block; color:white; text-decoration:none;
    padding:10px 0;
}

.main {margin-left:240px; padding:20px;}

.cards {
    display:flex; gap:20px; flex-wrap:wrap;
}

.card {
    background:white; padding:20px; border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    flex:1; min-width:180px;
}

form {
    background:white; padding:20px; border-radius:10px;
    margin-top:20px;
}

input, select, textarea {
    width:100%; padding:10px; margin:8px 0;
}

button {
    background:#2563eb; color:white;
    border:none; padding:10px 20px;
    border-radius:6px; cursor:pointer;
}

table {
    width:100%; border-collapse:collapse;
    margin-top:20px; background:white;
}

th, td {
    border:1px solid #ddd; padding:10px;
}

th {
    background:#2563eb; color:white;
}

/* Colores de estado */
.estado {
    color:white;
    padding:5px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Cumplimiento y MC</h2>
    <a href="#">Inicio</a>
    <a href="#">Actividades</a>
    <a href="#">Indicadores</a>
    <a href="#">Reportes</a>
</div>

<div class="main">

    <h1>Monitoring, Compliance and Continuous Improvement System</h1>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total Actividades</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>Horas Invertidas</h3>
            <p id="horas">0</p>
        </div>

        <div class="card">
            <h3>Nivel de Cumplimiento</h3>
            <p id="cumplimiento">0%</p>
        </div>
    </div>

    <!-- FORM -->
    <form id="actividadForm">
        <h2>Registrar Actividad</h2>

        <input type="text" id="titulo" placeholder="Título" required>

        <select id="categoria">
            <option>Seguridad</option>
            <option>Brigadas</option>
            <option>Infraestructura</option>
            <option>Ciberseguridad</option>
            <option>Otros</option>
        </select>

        <input type="date" id="fecha" required>

        <input type="time" id="inicio" required>

        <input type="time" id="fin" required>

        <select id="estado">
            <option>Completada</option>
            <option>En proceso</option>
            <option>Pendiente</option>
        </select>

        <textarea id="observacion" placeholder="Observaciones"></textarea>

        <button type="submit">Guardar Actividad</button>
    </form>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Fecha</th>
                <th>Horas</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

<script>
let actividades = JSON.parse(localStorage.getItem("actividades")) || [];

/* COLOR SEGÚN ESTADO */
function getColor(estado){
    if(estado === "Completada") return "#16a34a"; // verde
    if(estado === "En proceso") return "#f59e0b"; // amarillo
    return "#dc2626"; // rojo
}

/* ACTUALIZAR UI */
function actualizar() {

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    let horasTotales = 0;
    let completadas = 0;

    actividades.forEach((a, index) => {

        if(a.estado === "Completada") completadas++;

        horasTotales += a.horas;

        tabla.innerHTML += `
            <tr>
                <td>${a.titulo}</td>
                <td>${a.categoria}</td>
                <td>${a.fecha}</td>
                <td>${a.horas.toFixed(2)}</td>

                <td>
                    <select onchange="cambiarEstado(${index}, this.value)"
                        style="background:${getColor(a.estado)}; color:white; border:none; padding:6px; border-radius:5px;">
                        <option ${a.estado === "Pendiente" ? "selected" : ""}>Pendiente</option>
                        <option ${a.estado === "En proceso" ? "selected" : ""}>En proceso</option>
                        <option ${a.estado === "Completada" ? "selected" : ""}>Completada</option>
                    </select>
                </td>
            </tr>
        `;
    });

    document.getElementById("total").textContent = actividades.length;
    document.getElementById("horas").textContent = horasTotales.toFixed(2);

    let porcentaje = actividades.length > 0
        ? (completadas / actividades.length) * 100
        : 0;

    document.getElementById("cumplimiento").textContent =
        porcentaje.toFixed(0) + "%";

    localStorage.setItem("actividades", JSON.stringify(actividades));
}

/* CAMBIAR ESTADO */
function cambiarEstado(index, nuevoEstado){
    actividades[index].estado = nuevoEstado;
    actualizar();
}

/* GUARDAR ACTIVIDAD */
document.getElementById("actividadForm")
.addEventListener("submit", function(e){
    e.preventDefault();

    let inicio = document.getElementById("inicio").value;
    let fin = document.getElementById("fin").value;

    let hi = inicio.split(":");
    let hf = fin.split(":");

    let horas =
        (parseInt(hf[0]) + parseInt(hf[1])/60) -
        (parseInt(hi[0]) + parseInt(hi[1])/60);

    actividades.push({
        titulo: titulo.value,
        categoria: categoria.value,
        fecha: fecha.value,
        horas: horas,
        estado: estado.value,
        observacion: observacion.value
    });

    this.reset();
    actualizar();
});

actualizar();
</script>

</body>
</html>
