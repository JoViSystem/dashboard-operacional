<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance & Continuous Improvement System</title>

<style>
body {font-family: Arial; margin:0; background:#f4f6f9;}

.sidebar {
    width:220px; height:100vh; position:fixed;
    background:#1f2937; color:white; padding:20px;
}

.sidebar a {
    display:block; color:white; text-decoration:none;
    padding:10px 10px;
    cursor:pointer;
}

.main {
    margin-left:240px; padding:20px;
}

.section {display:none;}
.active {display:block;}

.cards {display:flex; gap:20px;}

.card {
    background:white; padding:15px;
    border-radius:10px; flex:1;
}

/* estados */
.badge {
    padding:5px 8px;
    border-radius:5px;
    color:white;
    font-size:12px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Cumplimiento MC</h2>

    <a onclick="showSection('inicio')">Inicio</a>
    <a onclick="showSection('actividades')">Actividades</a>
    <a onclick="showSection('reportes')">Reportes</a>
    <a onclick="showSection('indicadores')">Indicadores</a>
</div>

<div class="main">

<!-- INICIO -->
<div id="inicio" class="section active">
    <h1>Dashboard General</h1>

    <div class="cards">
        <div class="card">
            <h3>Actividades</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>Horas</h3>
            <p id="horas">0</p>
        </div>

        <div class="card">
            <h3>Cumplimiento</h3>
            <p id="cumplimiento">0%</p>
        </div>
    </div>
</div>

<!-- ACTIVIDADES -->
<div id="actividades" class="section">

    <h1>Actividades</h1>

    <form id="actividadForm">
        <input id="titulo" placeholder="Título" required>

        <select id="categoria">
            <option>Seguridad</option>
            <option>Infraestructura</option>
            <option>Ciberseguridad</option>
            <option>Auditorias</option>
            <option>Otros</option>
        </select>

        <input type="date" id="fecha" required>
        <input type="time" id="inicio" required>
        <input type="time" id="fin" required>

        <select id="estado">
            <option>Pendiente</option>
            <option>En proceso</option>
            <option>Completada</option>
        </select>

        <textarea id="observacion" placeholder="Observación"></textarea>

        <button type="submit">Guardar</button>
    </form>

    <table border="1" width="100%" style="margin-top:15px;background:white;">
        <thead>
            <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Fecha</th>
                <th>Horas</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<!-- REPORTES -->
<div id="reportes" class="section">

    <h1>Reportes (Seguimiento)</h1>

    <form id="reporteForm">
        <input id="r_titulo" placeholder="Título del reporte" required>

        <select id="r_tipo">
            <option>Infraestructura</option>
            <option>Seguridad</option>
            <option>Incidente</option>
            <option>Otros</option>
        </select>

        <textarea id="r_desc" placeholder="Descripción"></textarea>

        <select id="r_estado">
            <option>Abierto</option>
            <option>En proceso</option>
            <option>Cerrado</option>
        </select>

        <button>Crear Reporte</button>
    </form>

    <table border="1" width="100%" style="margin-top:15px;background:white;">
        <thead>
            <tr>
                <th>Título</th>
                <th>Tipo</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tablaReportes"></tbody>
    </table>

</div>

<!-- INDICADORES -->
<div id="indicadores" class="section">
    <h1>Indicadores</h1>
    <p>Aquí luego metemos gráficas 📊</p>
</div>

</div>

<script>

let actividades = JSON.parse(localStorage.getItem("act")) || [];
let reportes = JSON.parse(localStorage.getItem("rep")) || [];

/* NAV */
function showSection(id){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ACTIVIDADES */
function render(){
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    let horas = 0;
    let ok = 0;

    actividades.forEach((a,i)=>{
        horas += a.horas;
        if(a.estado==="Completada") ok++;

        tabla.innerHTML += `
        <tr>
            <td>${a.titulo}</td>
            <td>${a.categoria}</td>
            <td>${a.fecha}</td>
            <td>${a.horas.toFixed(2)}</td>
            <td>
                <select onchange="cambiar(${i},this.value)">
                    <option ${a.estado==="Pendiente"?"selected":""}>Pendiente</option>
                    <option ${a.estado==="En proceso"?"selected":""}>En proceso</option>
                    <option ${a.estado==="Completada"?"selected":""}>Completada</option>
                </select>
            </td>
        </tr>`;
    });

    document.getElementById("total").innerText = actividades.length;
    document.getElementById("horas").innerText = horas.toFixed(2);
    document.getElementById("cumplimiento").innerText =
        actividades.length ? (ok/actividades.length*100).toFixed(0)+"%" : "0%";

    localStorage.setItem("act", JSON.stringify(actividades));
}

function cambiar(i,v){
    actividades[i].estado=v;
    render();
}

/* FORM ACTIVIDAD */
actividadForm.onsubmit = e=>{
    e.preventDefault();

    let h1 = inicio.value.split(":");
    let h2 = fin.value.split(":");

    let horas = (parseInt(h2[0])+h2[1]/60)-(parseInt(h1[0])+h1[1]/60);

    actividades.push({
        titulo: titulo.value,
        categoria: categoria.value,
        fecha: fecha.value,
        horas: horas,
        estado: estado.value
    });

    actividadForm.reset();
    render();
};

/* REPORTES */
function renderRep(){
    let t = document.getElementById("tablaReportes");
    t.innerHTML = "";

    reportes.forEach((r,i)=>{
        t.innerHTML += `
        <tr>
            <td>${r.titulo}</td>
            <td>${r.tipo}</td>
            <td>${r.estado}</td>
        </tr>`;
    });

    localStorage.setItem("rep", JSON.stringify(reportes));
}

reporteForm.onsubmit = e=>{
    e.preventDefault();

    reportes.push({
        titulo: r_titulo.value,
        tipo: r_tipo.value,
        desc: r_desc.value,
        estado: r_estado.value
    });

    reporteForm.reset();
    renderRep();
};

/* INIT */
render();
renderRep();

</script>

</body>
</html>
