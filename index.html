<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance & Continuous Improvement System</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#eef2f7;
    color:#111827;
}

/* SIDEBAR */
.sidebar {
    width:260px;
    height:100vh;
    position:fixed;
    background:#111827;
    color:white;
    padding:25px;
}

.sidebar h2 {
    font-size:20px;
    margin-bottom:20px;
}

.sidebar a {
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 10px;
    font-size:16px;
    border-radius:6px;
    margin-bottom:5px;
    cursor: pointer;
}

.sidebar a:hover {
    background:#2563eb;
}

/* MAIN */
.main {
    margin-left:280px;
    padding:30px;
}

/* TITULOS */
h1 {
    font-size:32px;
    margin-bottom:20px;
}

h2 {
    font-size:24px;
}

/* CARDS */
.cards {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    flex:1;
    min-width:220px;
}

.card h3 {
    font-size:18px;
}

.card p {
    font-size:28px;
    font-weight:bold;
}

/* FORM */
form {
    background:white;
    padding:25px;
    border-radius:12px;
    margin-top:25px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

input, select, textarea {
    width:100%;
    padding:14px;
    margin:10px 0;
    font-size:16px;
    border-radius:8px;
    border:1px solid #d1d5db;
    box-sizing: border-box;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#1d4ed8;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

th {
    background:#111827;
    color:white;
    padding:14px;
    font-size:15px;
}

td {
    padding:14px;
    font-size:15px;
    border-bottom:1px solid #e5e7eb;
}

/* ETIQUETAS DE ESTADO (NUEVOS COLORES) */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 13px;
    display: inline-block;
}

/* Pendiente / Abierto -> Rojo */
.badge-rojo {
    background-color: #fee2e2;
    color: #dc2626;
}

/* En proceso -> Amarillo */
.badge-amarillo {
    background-color: #fef3c7;
    color: #d97706;
}

/* Completada / Cerrado -> Verde */
.badge-verde {
    background-color: #d1fae5;
    color: #059669;
}

/* SECCIONES */
.section {display:none;}
.active {display:block;}

</style>
</head>

<body>

<div class="sidebar">
    <h2>Control MC</h2>

    <a onclick="showSection('inicio')">Inicio</a>
    <a onclick="showSection('actividades')">Actividades</a>
    <a onclick="showSection('reportes')">Reportes</a>
    <a onclick="showSection('indicadores')">Indicadores</a>
</div>

<div class="main">

<div id="inicio" class="section active">
    <h1>Dashboard General</h1>

    <div class="cards">
        <div class="card">
            <h3>Total Actividades</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>Horas Invertidas</h3>
            <p id="horas">0</p>
        </div>

        <div class="card">
            <h3>Cumplimiento</h3>
            <p id="cumplimiento">0%</p>
        </div>
    </div>
</div>

<div id="actividades" class="section">

<h1>Gestión de Actividades</h1>

<form id="actividadForm">
    <input id="titulo" placeholder="Título de la actividad" required>

    <select id="categoria">
        <option>Seguridad</option>
        <option>Infraestructura</option>
        <option>Ciberseguridad</option>
        <option>Inspecciones</option>
        <option>Auditorías</option>
        <option>Otros</option>
    </select>

    <input type="date" id="fecha" required>

    <input type="time" id="hora_inicio" required>
    <input type="time" id="hora_fin" required>

    <select id="estado">
        <option>Pendiente</option>
        <option>En proceso</option>
        <option>Completada</option>
    </select>

    <textarea id="observacion" placeholder="Observaciones"></textarea>

    <button type="submit">Guardar Actividad</button>
</form>

<table>
    <thead>
        <tr>
            <th>Título</th>
            <th>Categoría</th>
            <th>Fecha</th>
            <th>Horas</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

</div>

<div id="reportes" class="section">

<h1>Gestión de Reportes</h1>

<form id="reporteForm">
    <input id="r_titulo" placeholder="Título del reporte" required>

    <select id="r_tipo">
        <option>Infraestructura</option>
        <option>Seguridad</option>
        <option>Incidente</option>
        <option>Otros</option>
    </select>

    <textarea id="r_desc" placeholder="Descripción"></textarea>

    <select id="r_estado">
        <option>Abierto</option>
        <option>En proceso</option>
        <option>Cerrado</option>
    </select>

    <button type="submit">Crear Reporte</button>
</form>

<table>
    <thead>
        <tr>
            <th>Título</th>
            <th>Tipo</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody id="tablaReportes"></tbody>
</table>

</div>

<div id="indicadores" class="section">
    <h1>Indicadores</h1>
    <p style="font-size:18px;">Aquí luego agregamos gráficas y KPIs 📊</p>
</div>

</div>

<script>

let actividades = JSON.parse(localStorage.getItem("act")) || [];
let reportes = JSON.parse(localStorage.getItem("rep")) || [];

/* NAV */
function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ACTIVIDADES */
function render(){

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    let horas = 0;
    let ok = 0;

    actividades.forEach((a,i)=>{

        horas += a.horas;
        if(a.estado==="Completada") ok++;

        // Asignación de colores solicitada
        let claseEstado = "";
        if(a.estado === "Pendiente") claseEstado = "badge-rojo";
        if(a.estado === "En proceso") claseEstado = "badge-amarillo";
        if(a.estado === "Completada") claseEstado = "badge-verde";

        tabla.innerHTML += `
        <tr>
            <td>${a.titulo}</td>
            <td>${a.categoria}</td>
            <td>${a.fecha}</td>
            <td>${a.horas.toFixed(2)}</td>
            <td><span class="badge ${claseEstado}">${a.estado}</span></td>
        </tr>`;
    });

    document.getElementById("total").innerText = actividades.length;
    document.getElementById("horas").innerText = horas.toFixed(2);
    document.getElementById("cumplimiento").innerText =
        actividades.length ? (ok/actividades.length*100).toFixed(0)+"%" : "0%";

    localStorage.setItem("act", JSON.stringify(actividades));
}

/* FORM ACTIVIDAD */
actividadForm.onsubmit = e=>{
    e.preventDefault();

    let h1 = hora_inicio.value.split(":");
    let h2 = hora_fin.value.split(":");

    let horas = (parseInt(h2[0])+h2[1]/60)-(parseInt(h1[0])+h1[1]/60);
    
    if (horas < 0) {
        alert("La hora de fin no puede ser menor que la hora de inicio");
        return;
    }

    actividades.push({
        titulo: titulo.value,
        categoria: categoria.value,
        fecha: fecha.value,
        horas: horas,
        estado: estado.value
    });

    actividadForm.reset();
    render();
};

/* REPORTES */
function renderRep(){
    let t = document.getElementById("tablaReportes");
    t.innerHTML = "";

    reportes.forEach(r=>{
        // Asignación de colores para reportes consistente con actividades
        let claseRep = "";
        if(r.estado === "Abierto") claseRep = "badge-rojo";
        if(r.estado === "En proceso") claseRep = "badge-amarillo";
        if(r.estado === "Cerrado") claseRep = "badge-verde";

        t.innerHTML += `
        <tr>
            <td>${r.titulo}</td>
            <td>${r.tipo}</td>
            <td><span class="badge ${claseRep}">${r.estado}</span></td>
        </tr>`;
    });

    localStorage.setItem("rep", JSON.stringify(reportes));
}

reporteForm.onsubmit = e=>{
    e.preventDefault();

    reportes.push({
        titulo: r_titulo.value,
        tipo: r_tipo.value,
        desc: r_desc.value,
        estado: r_estado.value
    });

    reporteForm.reset();
    renderRep();
};

render();
renderRep();

</script>

</body>
</html>
